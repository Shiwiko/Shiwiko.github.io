<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Shiwiko</title>
<link rel="stylesheet" href="profil.css">
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="background1.mp4" type="video/mp4">
</video>

<!-- PLAYER EN HAUT -->
<div class="top-player">
  Volume
  <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
  <button onclick="toggleMusicMenu()">Musique</button>
</div>

<!-- MENU MUSIQUE -->
<div class="music-menu" id="musicMenu">
  <button onclick="changeMedia('music1.mp3', 'background1.mp4')">Musique 1</button>
  <button onclick="changeMedia('music2.mp3', 'background2.mp4')">Musique 2</button>
  <button onclick="changeMedia('music3.mp3', 'background3.mp4')">Musique 3</button>
</div>

<!-- CONTENU -->
<div class="content">

  <!-- PROFIL -->
  <div class="profile">
    <img src="https://i.postimg.cc/vBfCMhP8/b4db858757df355a17ac4743ace291b7.jpg" alt="Profil">
  </div>

  <!-- DESCRIPTION -->
  <div class="description">
    Bienvenue sur mon site
  </div>

  <!-- BOUTONS -->
  <div class="buttons">
    <a class="link-btn" href="https://youtube.com">
      <img src="https://i.postimg.cc/Y0xS2Z8h/youtube.png" alt="YouTube">
      <span>Youtube</span>
    </a>

    <a class="link-btn" href="https://discord.com">
      <img src="https://i.postimg.cc/SQ5mm1QT/85e9d74f125bb82aa4be2478ce02bbd4.jpg" alt="Discord">
      <span>Discord</span>
    </a>

    <a class="link-btn" href="https://twitter.com">
      <img src="https://i.postimg.cc/8P3GkxMf/twitter.png" alt="Twitter">
      <span>Twitter</span>
    </a>
  </div>
</div>

<!-- AUDIO -->
<audio id="music" autoplay loop>
  <source src="music1.mp3" type="audio/mp3">
</audio>

<script>
let music = document.getElementById("music");
let video = document.getElementById("bg-video");

// Volume initial
music.volume = 0.5;

// Fonction pour changer musique et vidéo en même temps
function changeMedia(musicSrc, videoSrc){
  music.src = musicSrc;
  music.play();
  
  // Change la source de la vidéo
  video.src = videoSrc;
  video.play();
}

// Fonction pour gérer le volume
function setVolume(v){
  music.volume = v;
}

// Toggle menu musique
function toggleMusicMenu(){
  let menu = document.getElementById("musicMenu");
  if(menu.style.display === "block"){
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

// Auto play musique et vidéo au chargement
window.addEventListener('load', () => {
  music.play();
  video.play();
});
</script>

</body>
</html>
