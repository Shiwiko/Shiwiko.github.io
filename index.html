<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Shiwiko</title>
<link rel="stylesheet" href="profil.css">
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video id="bg-video" loop playsinline>
  <source src="https://n.uguu.se/aYCGxlGg.mp4" type="video/mp4">
</video>

<!-- PLAYER -->
<div class="top-player">
  <button onclick="playVideo()">Play</button>
  <button onclick="stopVideo()">Stop</button>
  Volume
  <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
</div>

<!-- CONTENU -->
<div class="content">

  <!-- PROFIL -->
  <div class="profile">
    <img src="https://i.postimg.cc/vBfCMhP8/b4db858757df355a17ac4743ace291b7.jpg" alt="Profil">
  </div>

  <!-- DESCRIPTION -->
  <div class="description">
    Bienvenue sur mon site
  </div>

  <!-- BOUTONS -->
  <div class="buttons">
    <a class="link-btn" href="https://youtube.com">
      <img src="https://i.postimg.cc/Y0xS2Z8h/youtube.png" alt="YouTube">
      <span>Youtube</span>
    </a>

    <a class="link-btn" href="https://discord.com">
      <img src="https://i.postimg.cc/SQ5mm1QT/85e9d74f125bb82aa4be2478ce02bbd4.jpg" alt="Discord">
      <span>Discord</span>
    </a>

    <a class="link-btn" href="https://twitter.com">
      <img src="https://i.postimg.cc/8P3GkxMf/twitter.png" alt="Twitter">
      <span>Twitter</span>
    </a>
  </div>
</div>

<script>
let video = document.getElementById("bg-video");

// Volume initial
video.volume = 0.5;

// Play / Stop vidéo
function playVideo(){
  video.play().catch(() => {
    alert("Clique sur Play pour autoriser le son !");
  });
}

function stopVideo(){
  video.pause();
}

// Changer le volume
function setVolume(v){
  video.volume = v;
}
</script>

</body>
</html>
